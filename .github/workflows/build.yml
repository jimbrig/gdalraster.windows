# ============================================================================
# build.yml — Build self-contained GDAL Windows binaries and publish a
#             durable GDAL runtime bundle.
#
# Scope: this workflow's only responsibility is producing the GDAL runtime
# bundle. Building gdalraster against it is package functionality
# (gdalraster.windows::install_gdalraster() with scoped Makevars via withr)
# and is exercised by the package's own tests, not by CI here.
#
# Triggers:
#   - workflow_dispatch  : manually, with configurable GDAL version + force flag
#   - push to tag        : gdal-v* (e.g. git tag gdal-v3.13.0)
#
# Artefact strategy (every run produces durable output):
#   Workflow artifact : upload-artifact@v5  retention=30d  no compression
#   Release asset     : softprops/action-gh-release@v2 on tag pushes or
#                       publish_release=true (the dispatch default)
#
# Cache strategy:
#   MSYS2 packages : handled automatically by msys2/setup-msys2@v2 (cache: true)
#   GDAL build     : actions/cache@v4 keyed on GDAL version + runner OS +
#                    build-script hash. A re-dispatch with an unchanged version
#                    and scripts restores the bundle and republishes in minutes
#                    instead of rebuilding for ~25-40 min.
# ============================================================================

name: Build GDAL (Windows)

on:
  workflow_dispatch:
    inputs:
      gdal_version:
        description: 'GDAL git tag to build (e.g. v3.13.0)'
        required: true
        default: 'v3.13.0'
      force_rebuild_gdal:
        description: 'Force full GDAL rebuild, ignoring cache'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      publish_release:
        description: 'Publish/update durable GitHub release asset'
        required: false
        default: 'true'
        type: choice
        options: ['false', 'true']

  push:
    tags:
      - 'gdal-v*'   # e.g. gdal-v3.13.0

# Required by softprops/action-gh-release to create releases and upload assets.
# Using minimum required scope — contents:write only.
permissions:
  contents: write

# Centralise defaults for manual runs.
env:
  GDAL_VERSION: ${{ github.event.inputs.gdal_version || 'v3.13.0' }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build GDAL from source
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-gdal:
    name: "Build GDAL"
    runs-on: windows-latest

    outputs:
      artifact-name: ${{ steps.names.outputs.artifact }}
      gdal-version:  ${{ steps.names.outputs.gdal_ver }}
      cache-hit:     ${{ steps.gdal-cache-restore.outputs.cache-hit }}

    steps:
      # ── 0. Checkout ──────────────────────────────────────────────────────
      # Line-ending fix MUST precede checkout when using msys2 shells.
      - name: Configure git line endings
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v4

      # ── 1. Derive names / paths ──────────────────────────────────────────
      - name: Set artifact and version names
        id: names
        shell: pwsh
        run: |
          $ver = "${{ env.GDAL_VERSION }}"
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}".StartsWith("refs/tags/gdal-v")) {
            $ver = "${{ github.ref_name }}" -replace '^gdal-', ''
          }
          # Normalise: strip leading 'v' for filesystem paths, keep 'v' for git
          $ver_bare = $ver.TrimStart('v')
          $artifact = "gdal-ucrt64-${ver}"
          $release_tag = "gdal-v${ver_bare}"
          echo "artifact=${artifact}"   >> $env:GITHUB_OUTPUT
          echo "gdal_ver=${ver}"        >> $env:GITHUB_OUTPUT
          echo "gdal_ver_bare=${ver_bare}" >> $env:GITHUB_OUTPUT
          echo "release_tag=${release_tag}" >> $env:GITHUB_OUTPUT
          echo "bundle_dir=${{ github.workspace }}\gdal-bundle" >> $env:GITHUB_OUTPUT

      # ── 2. MSYS2 UCRT64 environment ──────────────────────────────────────
      # release: true  (default) — installs fresh MSYS2, not the runner image copy.
      #                            The runner image copy is old; fresh is reproducible.
      # update: true             — update base packages before installing ours.
      # path-type: minimal       — prevents Windows PATH (incl. Rtools) leaking
      #                            into MSYS2 build env, which could cause
      #                            wrong headers/libs to be picked up silently.
      # cache: true              — default; caches MSYS2 installation between runs.
      #                            Key derived from package list automatically.
      #
      # Package rationale:
      #   proj            — REQUIRED: GDAL hard-dep; CMake fails without it
      #   gdal            — provides pre-built headers/libs as reference; our build
      #                     replaces the runtime DLL but headers are reused
      #   libxml2         — GDAL XML parsing (GML, KML, WFS, etc.)
      #   xerces-c        — GDAL XML validation (GML schemas)
      #   libdeflate      — faster DEFLATE for GeoTIFF/COG
      #   libtiff         — GeoTIFF raster support
      #   libgeotiff      — GeoTIFF coordinate metadata
      #   sqlite3         — GPKG, FlatGeobuf, MBTiles, GDAL internal use
      #   curl            — /vsicurl/, cloud drivers (S3, GCS, Azure)
      #   zlib            — general compression
      #   muparser        — Algorithmic API (gdal_global_reg_names fix)
      #   pkgconf         — pkg-config shim used by cmake find-modules
      #   ntldd           — walk PE import tree to find transitive DLL deps
      - name: Setup MSYS2 UCRT64
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem:   UCRT64
          update:    true
          path-type: minimal
          install: >-
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-proj
            mingw-w64-ucrt-x86_64-gdal
            mingw-w64-ucrt-x86_64-libxml2
            mingw-w64-ucrt-x86_64-xerces-c
            mingw-w64-ucrt-x86_64-libdeflate
            mingw-w64-ucrt-x86_64-libtiff
            mingw-w64-ucrt-x86_64-libgeotiff
            mingw-w64-ucrt-x86_64-sqlite3
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-muparser
            mingw-w64-ucrt-x86_64-arrow
            mingw-w64-ucrt-x86_64-hdf5
            mingw-w64-ucrt-x86_64-netcdf
            mingw-w64-ucrt-x86_64-geos
            mingw-w64-ucrt-x86_64-libspatialite
            mingw-w64-ucrt-x86_64-poppler
            mingw-w64-ucrt-x86_64-openjpeg2
            mingw-w64-ucrt-x86_64-libwebp
            mingw-w64-ucrt-x86_64-libjxl
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-ntldd

      - name: Refresh UCRT64 package state and print key versions
        shell: msys2 {0}
        run: |
          pacman -Syu --noconfirm
          pacman -Qi \
            mingw-w64-ucrt-x86_64-gdal \
            mingw-w64-ucrt-x86_64-proj \
            mingw-w64-ucrt-x86_64-geos \
            mingw-w64-ucrt-x86_64-muparser \
            mingw-w64-ucrt-x86_64-libxml2 \
            mingw-w64-ucrt-x86_64-libdeflate \
            mingw-w64-ucrt-x86_64-crypto++ \
            mingw-w64-ucrt-x86_64-ntldd \
            | sed -n '1,260p'

      # ── 3. GDAL build cache (keyed on version + script hash) ─────────────
      # This lets the R package job re-run without rebuilding GDAL.
      # Key includes a hash of the build script so any script change
      # invalidates the cache and triggers a fresh build.
      - name: Restore GDAL build cache
        id: gdal-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: gdal-bundle
          key: gdal-bundle-${{ steps.names.outputs.gdal_ver }}-${{ runner.os }}-${{ hashFiles('tools/build_gdal.sh', 'tools/collect_dlls.sh') }}

      # ── 4. Build GDAL from source (skipped on cache hit) ─────────────────
      - name: Build GDAL from source
        id: build-gdal
        if: steps.gdal-cache-restore.outputs.cache-hit != 'true' || github.event.inputs.force_rebuild_gdal == 'true'
        shell: msys2 {0}
        env:
          GDAL_VER:    ${{ steps.names.outputs.gdal_ver }}
          BUNDLE_DIR:  ${{ github.workspace }}/gdal-bundle
          INSTALL_DIR: ${{ github.workspace }}/gdal-install
        run: bash tools/build_gdal.sh

      # ── 5. Collect DLLs into self-contained bundle (skipped on cache hit) ─
      - name: Collect DLLs and assemble bundle
        if: steps.gdal-cache-restore.outputs.cache-hit != 'true' || github.event.inputs.force_rebuild_gdal == 'true'
        shell: msys2 {0}
        env:
          BUNDLE_DIR:  ${{ github.workspace }}/gdal-bundle
          INSTALL_DIR: ${{ github.workspace }}/gdal-install
        run: bash tools/collect_dlls.sh

      # ── 6. Save GDAL bundle to cache (only when freshly built) ───────────
      - name: Save GDAL build cache
        if: (steps.gdal-cache-restore.outputs.cache-hit != 'true' || github.event.inputs.force_rebuild_gdal == 'true') && steps.build-gdal.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: gdal-bundle
          key: gdal-bundle-${{ steps.names.outputs.gdal_ver }}-${{ runner.os }}-${{ hashFiles('tools/build_gdal.sh', 'tools/collect_dlls.sh') }}

      # ── 7. Verify bundle integrity ────────────────────────────────────────
      # Asserts all bundle contract pieces consumed by gdalraster.windows:
      # the GDAL runtime DLL, GDAL/PROJ data directories, and the pure-python
      # osgeo_utils package required by embedded-python algorithms.
      - name: Verify GDAL bundle
        id: verify-bundle
        shell: pwsh
        run: |
          $dll = Get-ChildItem "gdal-bundle\bin\libgdal-*.dll" | Select-Object -First 1
          if (-not $dll) {
            Write-Error "FATAL: No libgdal-*.dll found. Bundle assembly failed."
            exit 1
          }
          foreach ($req in @(
            "gdal-bundle\share\gdal",
            "gdal-bundle\share\proj",
            "gdal-bundle\python\osgeo_utils\samples\validate_gpkg.py"
          )) {
            if (-not (Test-Path $req)) {
              Write-Error "FATAL: required bundle path missing: $req"
              exit 1
            }
          }
          $mb = [math]::Round($dll.Length / 1MB, 1)
          $dll_count = (Get-ChildItem "gdal-bundle\bin\*.dll").Count
          $py_count  = (Get-ChildItem "gdal-bundle\python" -Recurse -Filter *.py).Count
          Write-Host "✓ $($dll.Name) found (${mb} MB)"
          Write-Host "✓ share/gdal, share/proj present"
          Write-Host "✓ python/osgeo_utils present (${py_count} .py files)"
          echo "gdal_dll=$($dll.Name)"   >> $env:GITHUB_OUTPUT
          echo "gdal_dll_mb=${mb}"       >> $env:GITHUB_OUTPUT
          echo "dll_count=${dll_count}"  >> $env:GITHUB_OUTPUT
          echo "py_count=${py_count}"    >> $env:GITHUB_OUTPUT
          Write-Host "`nBundle DLL inventory:"
          Get-ChildItem "gdal-bundle\bin\*.dll" |
            Select-Object Name, @{N='MB';E={[math]::Round($_.Length/1MB,2)}} |
            Sort-Object Name | Format-Table -AutoSize

      # ── 8. Upload bundle as workflow artifact (always) ────────────────────
      # compression-level: 0 — DLLs are already-compressed PE binaries.
      #                        Re-compressing wastes 30-60s and gains <5%.
      # retention-days: 30  — Every build's output stays retrievable even when
      #                        release publication is skipped; no build minute
      #                        is ever wasted for lack of a published artifact.
      - name: Upload GDAL bundle artifact
        id: upload-gdal
        uses: actions/upload-artifact@v5
        with:
          name:              ${{ steps.names.outputs.artifact }}
          path:              gdal-bundle/
          compression-level: 0
          retention-days:    30
          if-no-files-found: error

      # ── 9. Create distributable zip (always) and publish on request ──────
      # Zipped separately here so it has a clean name and isn't double-zipped
      # by upload-artifact's own wrapping. Created unconditionally so the
      # exact release file is inspectable from any run.
      - name: Create distributable GDAL bundle zip
        id: make-zip
        shell: pwsh
        run: |
          $zip = "gdal-ucrt64-${{ steps.names.outputs.gdal_ver }}-windows-x64.zip"
          Compress-Archive -Path "gdal-bundle\*" -DestinationPath $zip -CompressionLevel Optimal
          $mb = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "Release asset: ${zip} (${mb} MB)"
          echo "zip_name=${zip}" >> $env:GITHUB_OUTPUT
          echo "zip_mb=${mb}"    >> $env:GITHUB_OUTPUT

      - name: Publish GDAL bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:             ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.names.outputs.release_tag }}
          name:                 "GDAL ${{ steps.names.outputs.gdal_ver }} — Windows UCRT64"
          draft:                false
          prerelease:           false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files:                "gdal-ucrt64-${{ steps.names.outputs.gdal_ver }}-windows-x64.zip"
          body: |
            ## Self-contained GDAL ${{ steps.names.outputs.gdal_ver }} for Windows (UCRT64/MinGW)

            Built with:
            | Flag | Value | Why |
            |------|-------|-----|
            | `GDAL_USE_MUPARSER` | `ON` | Enables Algorithmic API (`gdal_global_reg_names()`) |
            | `GDAL_HIDE_INTERNAL_SYMBOLS` | `ON` | Cleaner export table |
            | `--kill-at` | (linker) | Correct stdcall symbol decoration for MinGW DLLs |
            | Static GCC/stdc++/winpthread | (linker) | No Rtools or MSYS2 required at runtime |

            ### Runtime bundle asset
            Download:
            `gdal-ucrt64-${{ steps.names.outputs.gdal_ver }}-windows-x64.zip`

            Release tag:
            `${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.names.outputs.release_tag }}`

            This release contains only the GDAL runtime bundle.
            `gdalraster.windows` package installation/build is handled separately.

            ### R package usage (local machine)
            ```r
            gdalraster.windows::install_gdal_runtime(
              repo = "${{ github.repository }}",
              tag = "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.names.outputs.release_tag }}"
            )
            ```

      # ── 10. Build transparency summary ────────────────────────────────────
      # Rendered on the run's summary page so the outcome (cache vs fresh
      # build, bundle composition, where the output landed) is visible at a
      # glance without digging through step logs.
      - name: Write build summary
        if: always()
        shell: pwsh
        run: |
          $published = ("${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true") -or ("${{ github.event.inputs.publish_release }}" -eq "true")
          $source = if ("${{ steps.gdal-cache-restore.outputs.cache-hit }}" -eq "true" -and "${{ github.event.inputs.force_rebuild_gdal }}" -ne "true") { "cache (no rebuild)" } else { "fresh source build" }
          @"
          ## GDAL bundle build

          | Item | Value |
          |------|-------|
          | GDAL version | ``${{ steps.names.outputs.gdal_ver }}`` |
          | Bundle source | $source |
          | Runtime DLL | ``${{ steps.verify-bundle.outputs.gdal_dll }}`` (${{ steps.verify-bundle.outputs.gdal_dll_mb }} MB) |
          | Bundled DLLs | ${{ steps.verify-bundle.outputs.dll_count }} |
          | Python files (osgeo_utils) | ${{ steps.verify-bundle.outputs.py_count }} |
          | Workflow artifact | ``${{ steps.names.outputs.artifact }}`` (30-day retention) |
          | Distributable zip | ``${{ steps.make-zip.outputs.zip_name }}`` (${{ steps.make-zip.outputs.zip_mb }} MB) |
          | Published to release | $published (tag ``${{ steps.names.outputs.release_tag }}``) |
          "@ | Out-File -Append -Encoding utf8 $env:GITHUB_STEP_SUMMARY
